name: Deploy GPS Gateway to VPS

on:
  push:
    branches: [main]
    paths:
      - 'tcp-gateway/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gps-tcp-gateway

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tcp-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tcp-gateway/package-lock.json

      - run: npm ci
      - run: npm test --if-present
      - run: npm run lint --if-present

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: tcp-gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: http://${{ secrets.VPS_HOST }}:8080/health
    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "tcp-gateway/docker-compose.yml,tcp-gateway/deploy.sh,tcp-gateway/.env.example"
          target: "/opt/gps-gateway"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            cd /opt/gps-gateway

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull $IMAGE_TAG

            # Tag as local reference
            docker tag $IMAGE_TAG gps-tcp-gateway:latest

            # Run deployment script
            chmod +x deploy.sh
            ./deploy.sh

      - name: Health Check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://${{ secrets.VPS_HOST }}:8080/health | jq -r '.status' 2>/dev/null)
            if [ "$STATUS" = "ok" ] || [ "$STATUS" = "healthy" ]; then
              echo "✅ Gateway is healthy"
              exit 0
            fi
            echo "Waiting for gateway... attempt $i/30"
            sleep 5
          done
          echo "❌ Health check failed after 150s"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check VPS logs with: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'docker logs gps-tcp-gateway --tail 50'"
