version: '3.8'

services:
  gps-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gps-tcp-gateway
    restart: unless-stopped
    
    # Environment variables
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GATEWAY_SHARED_KEY=${GATEWAY_SHARED_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BATCH_INTERVAL_MS=${BATCH_INTERVAL_MS:-5000}
      - BATCH_SIZE=${BATCH_SIZE:-50}
      - REDIS_URL=${REDIS_URL:-}
      - ENABLE_SOCKET_GATEWAY=${ENABLE_SOCKET_GATEWAY:-true}
      - SOCKETIO_PORT=9090
      - ENABLE_MQTT=${ENABLE_MQTT:-true}
      - MQTT_PORT=1883
      - MQTT_WS_PORT=9883
      - MQTT_AUTH_TOKEN=${MQTT_AUTH_TOKEN:-}
      - GT06_PORT=5001
      - TK103_PORT=5013
      - H02_PORT=5023
      - TELTONIKA_PORT=5027
      - QUECLINK_PORT=5030
      - RUPTELA_PORT=5031
      - YTWL_PORT=5032
      - HEALTH_PORT=8080
    
    # Port mappings
    ports:
      # TCP Ports
      - "5001:5001"   # GT06/Concox
      - "5013:5013"   # TK103
      - "5023:5023"   # H02/Sinotrack
      - "5027:5027"   # Teltonika
      - "5030:5030"   # Queclink
      - "5031:5031"   # Ruptela
      - "5032:5032"   # YTWL Speed Governor
      # UDP Ports
      - "5001:5001/udp"   # GT06 UDP
      - "5013:5013/udp"   # TK103 UDP
      - "5023:5023/udp"   # H02 UDP
      # Health check + Socket.io + MQTT
      - "8080:8080"
      - "9090:9090"   # Socket.io WebSocket gateway
      - "1883:1883"   # MQTT broker
      - "9883:9883"   # MQTT over WebSocket
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: gps-gateway-network
    driver: bridge
