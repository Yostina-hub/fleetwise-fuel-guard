         and any same-origin iframes. The Lovable preview iframe still needs

    <title>FleetTrack FMS - Enterprise Fleet Management System</title>
    <meta name="description" content="Comprehensive fleet management with real-time GPS tracking, fuel monitoring, driver behavior analysis, and maintenance management. Reduce costs by 10-25% with advanced analytics." />
    <meta name="author" content="FleetTrack" />

    <meta property="og:title" content="FleetTrack FMS - Fleet Management System" />
    <meta property="og:description" content="Real-time fleet tracking, fuel monitoring, and analytics for enterprise operations" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:hsl(220 35% 7%);color:hsl(180 100% 88%);font-family:Inter,system-ui,sans-serif;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
          <div style="width:38px;height:38px;border-radius:999px;border:2px solid hsl(180 100% 50% / .24);border-top-color:hsl(180 100% 50%);animation:fleettrack-spin 900ms linear infinite;"></div>
          <div style="font-size:14px;color:hsl(180 30% 72%);">Loading FleetTrack FMS…</div>
        </div>
      </div>
    </div>
    <style>@keyframes fleettrack-spin{to{transform:rotate(360deg)}}</style>
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            registration.unregister();
          });
        }).catch(function () {});
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              caches.delete(key);
            });
          }).catch(function () {});
        }
      })();
    </script>
    <script>
      (function loadApp(attempt) {
        var script = document.createElement("script");
        script.type = "module";
        script.src = "/src/main.tsx?boot=" + Date.now() + "-" + attempt;
        script.onerror = function () {
          if (attempt < 4) {
            setTimeout(function () { loadApp(attempt + 1); }, 350 * attempt);
            return;
          }
          document.getElementById("root").innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:hsl(220 35% 7%);color:hsl(0 84% 70%);font-family:Inter,system-ui,sans-serif;padding:24px;text-align:center;"><div><h1 style="font-size:20px;margin:0 0 8px;">App failed to load</h1><p style="margin:0;color:hsl(215 20% 70%);">Refresh the preview to retry the startup module.</p></div></div>';
        };
        document.body.appendChild(script);
      })(1);
    </script>
  </body>
</html>
